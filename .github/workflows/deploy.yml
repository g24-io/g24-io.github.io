name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required by actions/deploy-pages@v4 (OIDC-based deployment).
permissions:
  contents: read
  pages: write
  id-token: write

# Don't run two deploys at once.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build (zola)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.19.2

      - name: Show Zola version
        run: zola --version

      - name: Build site
        run: zola build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

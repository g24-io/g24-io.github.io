# g24-io-tech — Zola configuration
# https://www.getzola.org/documentation/getting-started/configuration/

base_url = "https://g24-io.github.io"
title = "g24-io-tech"
description = "Notes from building a programmatic ad exchange in Rust."
default_language = "zh-Hans"

# No external theme — templates and sass live in this repo.

# Output / build
output_dir = "public"
compile_sass = true
# Zola's elasticlunr search backend does not support zh-Hans tokenization.
# Disabled for now — when we add search, swap in pagefind via the Actions step.
build_search_index = false
generate_feeds = true
feed_filenames = ["rss.xml", "atom.xml"]

# Taxonomies — power /tags and /series
# (TOML: top-level array — must come BEFORE any `[table]` section.)
taxonomies = [
  { name = "tags", feed = true, paginate_by = 20 },
  { name = "series", feed = true, paginate_by = 20 },
]

# Markdown rendering
[markdown]
highlight_code = true
# Inline-style highlighting via a built-in syntect theme.
# Picks "ayu-dark" — cooler/greener palette that pairs better with the
# site's #00d4aa accent than OneHalfDark's blue-grey.
# Alternatives to try if this still feels off:
#   - "kronuz"        : terminal-green, very high-contrast
#   - "two-dark"      : softer blue-purple
#   - "dracula"       : pink/green/yellow on near-black
#   - "base16-mocha"  : warm brown undertone
#   - "gruvbox-dark"  : earthy retro
highlight_theme = "ayu-dark"
smart_punctuation = false
render_emoji = false
external_links_target_blank = true
external_links_no_follow = false
external_links_no_referrer = false
bottom_footnotes = true

# Anchor links on headings — needed for TOC
insert_anchor_links = "right"

# Site-wide variables consumed by templates
[extra]
author = "g24-io engineering"
github_org = "g24-io"
nav_links = [
  { name = "posts", url = "/posts/" },
  { name = "series", url = "/series/" },
  { name = "topics", url = "/tags/" },
  { name = "about", url = "/about/" },
  { name = "rss", url = "/rss.xml" },
]
